MOD_VP_ACCORDION="VP Accordion"
MOD_VP_ACCORDION_XML_DESCRIPTION="A lightweight Joomla module that creates clean, accessible accordion sections using native Bootstrap 5 markup. Ideal for FAQs, documentation snippets, pricing details and any content that benefits from being collapsed by default."

MOD_VP_ACCORDION_FIELDSET_ITEMS="Items"
MOD_VP_ACCORDION_FIELDSET_DISPLAY="Display"
MOD_VP_ACCORDION_FIELDSET_ASSETS="Assets"

MOD_VP_ACCORDION_FIELD_ITEMS_LABEL="Accordion items"
MOD_VP_ACCORDION_FIELD_ITEMS_DESC="Add as many items as you need. Each item becomes one collapsible panel."

MOD_VP_ACCORDION_FIELD_TITLE_LABEL="Title"
MOD_VP_ACCORDION_FIELD_TITLE_DESC="The visible heading shown on the accordion button."

MOD_VP_ACCORDION_FIELD_TEXT_LABEL="Content"
MOD_VP_ACCORDION_FIELD_TEXT_DESC="The HTML content shown when this item is expanded."

MOD_VP_ACCORDION_FIELD_OPEN_LABEL="Open by default"
MOD_VP_ACCORDION_FIELD_OPEN_DESC="When enabled, this item will be expanded on page load. In single-open mode only the first such item will actually be open."

MOD_VP_ACCORDION_FIELD_STYLE_LABEL="Style"
MOD_VP_ACCORDION_FIELD_STYLE_DESC="Choose the visual style of the accordion."
MOD_VP_ACCORDION_STYLE_DEFAULT="Default"
MOD_VP_ACCORDION_STYLE_FLUSH="Flush (no outer borders)"

MOD_VP_ACCORDION_FIELD_ALWAYS_OPEN_LABEL="Allow multiple open"
MOD_VP_ACCORDION_FIELD_ALWAYS_OPEN_DESC="When enabled, opening one item will not close the others."

MOD_VP_ACCORDION_FIELD_HEADING_LEVEL_LABEL="Heading level"
MOD_VP_ACCORDION_FIELD_HEADING_LEVEL_DESC="Choose the semantic heading level used for each accordion title. Use the level that fits the surrounding page outline."

MOD_VP_ACCORDION_FIELD_PREPARE_CONTENT_LABEL="Prepare content"
MOD_VP_ACCORDION_FIELD_PREPARE_CONTENT_DESC="When enabled, content plugins are applied to each item's body (smart tags, shortcodes, etc.)."

MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_JS_LABEL="Load Bootstrap collapse script"
MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_JS_DESC="When enabled, the module loads Joomla's bundled Bootstrap collapse script. Disable this if your site template already loads the full Bootstrap bundle to avoid duplicate JavaScript."

MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_CSS_LABEL="Load Bootstrap CSS"
MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_CSS_DESC="When enabled, the module loads Joomla's bundled Bootstrap CSS. Most modern Joomla templates already include it, so leave this disabled unless your template does not."
