MOD_VP_ACCORDION="VP Accordion"
MOD_VP_ACCORDION_XML_DESCRIPTION="Лёгкий модуль для Joomla, создающий чистые и доступные блоки-аккордеоны на базе нативной разметки Bootstrap 5. Подходит для FAQ, фрагментов документации, тарифов и любого содержимого, которое имеет смысл сворачивать по умолчанию."

MOD_VP_ACCORDION_FIELDSET_ITEMS="Элементы"
MOD_VP_ACCORDION_FIELDSET_DISPLAY="Отображение"
MOD_VP_ACCORDION_FIELDSET_ASSETS="Подключение ресурсов"

MOD_VP_ACCORDION_FIELD_ITEMS_LABEL="Пункты аккордеона"
MOD_VP_ACCORDION_FIELD_ITEMS_DESC="Добавьте столько пунктов, сколько необходимо. Каждый пункт станет отдельной сворачиваемой панелью."

MOD_VP_ACCORDION_FIELD_TITLE_LABEL="Заголовок"
MOD_VP_ACCORDION_FIELD_TITLE_DESC="Видимый заголовок на кнопке аккордеона."

MOD_VP_ACCORDION_FIELD_TEXT_LABEL="Содержимое"
MOD_VP_ACCORDION_FIELD_TEXT_DESC="HTML-содержимое, которое будет показано при раскрытии пункта."

MOD_VP_ACCORDION_FIELD_OPEN_LABEL="Раскрыт по умолчанию"
MOD_VP_ACCORDION_FIELD_OPEN_DESC="Если включено, пункт будет раскрыт при загрузке страницы. В режиме «один открыт» откроется только первый отмеченный пункт."

MOD_VP_ACCORDION_FIELD_STYLE_LABEL="Стиль"
MOD_VP_ACCORDION_FIELD_STYLE_DESC="Выберите визуальный стиль аккордеона."
MOD_VP_ACCORDION_STYLE_DEFAULT="Стандартный"
MOD_VP_ACCORDION_STYLE_FLUSH="Без внешних рамок (flush)"

MOD_VP_ACCORDION_FIELD_ALWAYS_OPEN_LABEL="Разрешить несколько открытых"
MOD_VP_ACCORDION_FIELD_ALWAYS_OPEN_DESC="Если включено, открытие одного пункта не закрывает остальные."

MOD_VP_ACCORDION_FIELD_HEADING_LEVEL_LABEL="Уровень заголовка"
MOD_VP_ACCORDION_FIELD_HEADING_LEVEL_DESC="Выберите семантический уровень заголовка для каждого пункта. Используйте уровень, соответствующий структуре страницы."

MOD_VP_ACCORDION_FIELD_PREPARE_CONTENT_LABEL="Обработать содержимое"
MOD_VP_ACCORDION_FIELD_PREPARE_CONTENT_DESC="Если включено, к содержимому каждого пункта применяются плагины контента (умные теги, шорткоды и т. д.)."

MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_JS_LABEL="Подключать скрипт Bootstrap collapse"
MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_JS_DESC="Если включено, модуль подключает встроенный в Joomla скрипт Bootstrap collapse. Отключите, если в вашем шаблоне уже подключён полный бандл Bootstrap, чтобы избежать дублирования JavaScript."

MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_CSS_LABEL="Подключать CSS Bootstrap"
MOD_VP_ACCORDION_FIELD_LOAD_BOOTSTRAP_CSS_DESC="Если включено, модуль подключает встроенный в Joomla CSS Bootstrap. Большинство современных шаблонов уже содержат его, поэтому оставьте отключённым, если ваш шаблон не исключение."
